{% extends "ledger/base.html" %}
{% block content %}
<div class="card login-card">
  <h2 class="section-title">
    {% if request.GET.role == 'admin' %}Admin Sign In
    {% elif request.GET.role == 'employee' %}Worker Sign In
    {% else %}Sign In{% endif %}
  </h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Log in</button>
  </form>
</div>
{% endblock %}
